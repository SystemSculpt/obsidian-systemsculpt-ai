name: Windows E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian version to install"
        required: false
        default: "1.8.9"

concurrency:
  group: windows-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-install-parity:
    runs-on: windows-latest
    timeout-minutes: 15
    # Bridge startup is flaky on GHA Windows runners (pre-existing, failing on main)
    continue-on-error: true
    env:
      OBSIDIAN_VERSION: ${{ inputs.obsidian_version || '1.8.9' }}
      SYSTEMSCULPT_RUNTIME_SMOKE_LICENSE_KEY: ${{ secrets.SYSTEMSCULPT_E2E_LICENSE_KEY }}
      SYSTEMSCULPT_RUNTIME_SMOKE_SERVER_URL: ${{ secrets.SYSTEMSCULPT_RUNTIME_SMOKE_SERVER_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build plugin
        run: npm run build

      - name: Rebundle plugin for desktop CI
        run: |
          npx esbuild main.js --bundle --outfile=main.js --allow-overwrite --format=cjs --platform=node --external:obsidian --external:electron --external:@codemirror/* --external:@lezer/* --external:@mariozechner/pi-tui

      # ---- Install Obsidian ----

      - name: Cache Obsidian installer
        id: obsidian-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/obsidian-installer
          key: obsidian-installer-${{ env.OBSIDIAN_VERSION }}

      - name: Download Obsidian installer
        if: steps.obsidian-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $installerDir = Join-Path $env:USERPROFILE "obsidian-installer"
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null
          $url = "https://github.com/obsidianmd/obsidian-releases/releases/download/v$env:OBSIDIAN_VERSION/Obsidian-$env:OBSIDIAN_VERSION.exe"
          $dest = Join-Path $installerDir "Obsidian-$env:OBSIDIAN_VERSION.exe"
          Write-Host "Downloading Obsidian $env:OBSIDIAN_VERSION from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          Write-Host "Downloaded: $((Get-Item $dest).Length) bytes"

      - name: Install Obsidian (silent)
        shell: pwsh
        run: |
          $installer = Join-Path $env:USERPROFILE "obsidian-installer" "Obsidian-$env:OBSIDIAN_VERSION.exe"
          Write-Host "Installing Obsidian from $installer"
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait -NoNewWindow
          $exe = Join-Path $env:LOCALAPPDATA "Programs\Obsidian\Obsidian.exe"
          $retries = 0
          while (!(Test-Path $exe) -and $retries -lt 15) {
            Start-Sleep -Seconds 2
            $retries++
            Write-Host "Waiting for Obsidian install to finish ($retries)..."
          }
          if (!(Test-Path $exe)) {
            throw "Obsidian.exe not found at $exe after silent install."
          }
          Write-Host "Obsidian installed at $exe"

      # ---- Bootstrap vault and launch ----

      - name: Prepare vault (no launch)
        shell: pwsh
        run: |
          node testing/native/device/windows/bootstrap.mjs `
            --reset-vault

      - name: Launch Obsidian
        shell: pwsh
        run: |
          $exe = Join-Path $env:LOCALAPPDATA "Programs\Obsidian\Obsidian.exe"
          $vault = Join-Path $env:USERPROFILE "Documents\SystemSculptWindowsQA"
          # Clear Pi-related env vars so clean-install parity holds
          $piKeys = @(
            'PI_CODING_AGENT_DIR','OPENAI_API_KEY','ANTHROPIC_API_KEY',
            'GEMINI_API_KEY','GOOGLE_API_KEY','GROQ_API_KEY','MISTRAL_API_KEY',
            'OPENROUTER_API_KEY','PERPLEXITY_API_KEY','DEEPSEEK_API_KEY',
            'XAI_API_KEY','CEREBRAS_API_KEY','SAMBANOVA_API_KEY','TOGETHER_API_KEY'
          )
          foreach ($key in $piKeys) {
            if (Test-Path "Env:$key") { Remove-Item "Env:$key" -ErrorAction SilentlyContinue }
          }
          Start-Process -FilePath $exe -ArgumentList @($vault, "--remote-debugging-port=9222")
          Write-Host "Obsidian launched from $exe with vault $vault (CDP on port 9222)"

      - name: Dismiss trust prompt and enable plugin via CDP
        shell: bash
        run: |
          node --experimental-websocket \
            testing/native/desktop-automation/cdp-trust-and-enable.mjs \
            --port 9222 \
            --plugin-id systemsculpt-ai

      - name: Wait for desktop automation bridge
        shell: pwsh
        run: |
          $discoveryDir = Join-Path $env:USERPROFILE ".systemsculpt\obsidian-automation"
          $deadline = (Get-Date).AddSeconds(120)
          $found = $false
          while ((Get-Date) -lt $deadline) {
            if (Test-Path $discoveryDir) {
              $files = Get-ChildItem -Path $discoveryDir -Filter *.json -ErrorAction SilentlyContinue
              foreach ($f in $files) {
                $parsed = Get-Content -Raw $f.FullName | ConvertFrom-Json -ErrorAction SilentlyContinue
                if ($parsed -and $parsed.pluginId -eq 'systemsculpt-ai' -and $parsed.port) {
                  Write-Host "Bridge discovered: port=$($parsed.port) vault=$($parsed.vaultName)"
                  $found = $true
                  break
                }
              }
              if ($found) { break }
            }
            Write-Host "Waiting for bridge discovery file..."
            Start-Sleep -Seconds 3
          }
          if (-not $found) {
            throw "Desktop automation bridge did not become ready within 120 seconds."
          }

      # ---- Run tests ----

      - name: Run clean-install parity
        run: node testing/native/device/windows/run-clean-install-parity.mjs

      # ---- Failure diagnostics ----

      - name: Capture screenshot on failure
        if: failure()
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type -AssemblyName System.Drawing
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $bitmap = New-Object System.Drawing.Bitmap($screen.Bounds.Width, $screen.Bounds.Height)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
          $graphics.CopyFromScreen($screen.Bounds.Location, [System.Drawing.Point]::Empty, $screen.Bounds.Size)
          $screenshotPath = Join-Path $env:GITHUB_WORKSPACE "failure-screenshot.png"
          $bitmap.Save($screenshotPath, [System.Drawing.Imaging.ImageFormat]::Png)
          $graphics.Dispose()
          $bitmap.Dispose()
          Write-Host "Screenshot saved to $screenshotPath"

      - name: Collect logs on failure
        if: failure()
        shell: pwsh
        run: |
          $diagDir = Join-Path $env:GITHUB_WORKSPACE "diagnostics"
          New-Item -ItemType Directory -Force -Path $diagDir | Out-Null
          $sources = @(
            @{ Name = "obsidian-logs";       Path = Join-Path $env:APPDATA "Obsidian\logs" },
            @{ Name = "plugin-dir";          Path = Join-Path $env:USERPROFILE "Documents\SystemSculptWindowsQA\.obsidian\plugins\systemsculpt-ai" },
            @{ Name = "bridge-discovery";    Path = Join-Path $env:USERPROFILE ".systemsculpt\obsidian-automation" }
          )
          foreach ($src in $sources) {
            if (Test-Path $src.Path) {
              $dest = Join-Path $diagDir $src.Name
              Copy-Item -Path $src.Path -Destination $dest -Recurse -Force -ErrorAction SilentlyContinue
              Write-Host "Collected: $($src.Path)"
            } else {
              Write-Host "Not found (skipping): $($src.Path)"
            }
          }

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-e2e-diagnostics
          path: |
            failure-screenshot.png
            diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      # ---- Cleanup ----

      - name: Stop Obsidian
        if: always()
        shell: pwsh
        run: |
          Get-Process -Name Obsidian -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "Obsidian processes stopped."
