name: Android E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      obsidian_version:
        description: "Obsidian version to install"
        required: false
        default: "1.12.7"

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # GHA Android emulator can be flaky (adb daemon failures, snapshot load failures)
    env:
      OBSIDIAN_VERSION: ${{ inputs.obsidian_version || '1.12.7' }}
      SYSTEMSCULPT_RUNTIME_SMOKE_LICENSE_KEY: ${{ secrets.SYSTEMSCULPT_E2E_LICENSE_KEY }}
      SYSTEMSCULPT_RUNTIME_SMOKE_SERVER_URL: ${{ secrets.SYSTEMSCULPT_RUNTIME_SMOKE_SERVER_URL }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build plugin
        run: npm run build

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache Obsidian APK
        id: obsidian-apk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/obsidian-installer
          key: obsidian-apk-${{ env.OBSIDIAN_VERSION }}

      - name: Download Obsidian APK
        if: steps.obsidian-apk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/obsidian-installer
          url="https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.apk"
          echo "Downloading Obsidian ${OBSIDIAN_VERSION} from ${url}"
          curl -fL -o ~/obsidian-installer/Obsidian-${OBSIDIAN_VERSION}.apk "${url}"
          ls -lh ~/obsidian-installer/

      - name: Run Android smoke tests
        uses: reactivecircus/android-emulator-runner@62dbb605bba737720e10b196cb4220d374026a6d # v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # The script must be in a file — this action splits inline scripts
          # into individual `sh -c` calls, breaking multi-line constructs.
          script: bash testing/native/device/android/ci-smoke.sh

      # ---- Failure diagnostics ----

      - name: Collect Android logs on failure
        if: failure()
        run: |
          mkdir -p diagnostics
          adb logcat -d > diagnostics/logcat.txt 2>/dev/null || true
          adb shell "ls -la /storage/emulated/0/Documents/SystemSculptAndroidQA/.obsidian/plugins/systemsculpt-ai/" > diagnostics/plugin-listing.txt 2>/dev/null || true
          echo "Android diagnostics collected"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-e2e-diagnostics
          path: diagnostics/
          retention-days: 7
          if-no-files-found: ignore
