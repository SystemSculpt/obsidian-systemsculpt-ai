name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Check (fast)
        run: npm run check:plugin:fast

      - name: Unit Tests
        run: npm test

  runtime-assets:
    name: Runtime Assets (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Runtime tests
        run: npm run test -- src/services/pi/__tests__/PiRuntimeBootstrap.test.ts src/services/pi/__tests__/PiCli.test.ts src/services/pi/__tests__/PiDesktopSetupUtils.test.ts src/studio/__tests__/studio-terminal-runtime-bootstrap.test.ts src/studio/__tests__/studio-terminal-sidecar-client.test.ts src/studio/__tests__/studio-terminal-sidecar-backend.test.ts src/studio/__tests__/studio-terminal-sidecar-script.integration.test.ts src/studio/__tests__/studio-terminal-session-manager.test.ts --runInBand

      - name: Build desktop runtime assets
        run: |
          npm run build:pi-runtime
          npm run verify:pi-runtime
          npm run build:terminal-runtime
