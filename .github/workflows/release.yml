name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm install
          npm run check:plugin:fast
          npm run test -- src/studio/__tests__/studio-terminal-runtime-bootstrap.test.ts src/studio/__tests__/studio-terminal-sidecar-client.test.ts src/studio/__tests__/studio-terminal-sidecar-backend.test.ts src/studio/__tests__/studio-terminal-sidecar-script.integration.test.ts src/studio/__tests__/studio-terminal-session-manager.test.ts --runInBand
          npm run build
          npm run build:terminal-runtime

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css studio-terminal-sidecar.cjs \
            dist/terminal-runtime/studio-terminal-runtime-manifest.json \
            dist/terminal-runtime/*.tgz
