name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Clean stale review comments and post initial comment
        id: init_comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          # Delete stale "Reviewing..." comments from previous crashed runs
          gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" --paginate --jq \
            '.[] | select(.body | test("SystemSculpt AI -- PR Review")) | select(.body | test("will be updated with findings")) | .id' \
            | while read -r OLD_ID; do
                gh api "repos/${{ github.repository }}/issues/comments/$OLD_ID" -X DELETE
                echo "Deleted stale review comment $OLD_ID"
              done

          BODY=$(cat <<'COMMENT'
          **SystemSculpt AI -- PR Review**

          Reviewing this PR now. Checking:
          - TypeScript strict mode & type safety
          - Plugin lifecycle (settings, bridge, hot-reload)
          - Platform separation (desktop vs mobile)
          - Build & bundle integrity
          - Test coverage
          - Security (no leaked keys, safe user data handling)

          *This comment will be updated with findings shortly...*
          COMMENT
          )

          COMMENT_URL=$(gh pr comment "$PR_NUMBER" --body "$BODY" 2>&1 | grep -o 'https://[^ ]*')
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -o '[0-9]*$')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Capture PR diff
        id: diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          BASE=${{ github.event.pull_request.base.sha || '' }}
          HEAD=${{ github.event.pull_request.head.sha || 'HEAD' }}
          if [ -z "$BASE" ]; then
            BASE=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName')
            BASE="origin/$BASE"
          fi
          git diff "$BASE"..."$HEAD" > ${{ github.workspace }}/pr-diff.txt
          echo "diff_file=${{ github.workspace }}/pr-diff.txt" >> "$GITHUB_OUTPUT"
          echo "Captured diff: $(wc -l < ${{ github.workspace }}/pr-diff.txt) lines"

      - uses: anthropics/claude-code-action@b2fdd80112e5f140e097b11d7a3d9edf0b226fd0 # v1 (latest main)
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": ["WebSearch", "WebFetch"]
              }
            }
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number || github.event.issue.number }} for **SystemSculpt AI**, an Obsidian plugin (TypeScript, esbuild, Jest).

            The PR diff has been saved to `${{ steps.diff.outputs.diff_file }}`. Read that file first to see all changes, then review against these criteria:

            **TypeScript & type safety**
            - Strict mode compliance -- no untyped `any` without justification
            - Proper use of Obsidian plugin API types

            **Plugin lifecycle**
            - Settings persistence correctness
            - Bridge reconnection and hot-reload paths not broken
            - onload/onunload cleanup (event listeners, intervals, MCP connections)

            **Platform separation**
            - Desktop vs mobile code paths must not bleed across
            - MCP transport and tool registration isolated correctly

            **Architecture**
            - Source structure: `src/core` (plugin/UI), `src/services` (logic), `src/mcp-tools`, `src/settings`, `src/views`, `src/commands`
            - Path alias: `@/*` maps to `Nexus/src/*`

            **Build & bundle**
            - esbuild config changes must not break CSS inlining or banner wrapping
            - Plugin sync (multi-platform vault mirroring) impact if touched

            **Tests**
            - Jest with SWC; mocks for `obsidian`, `pi-coding-agent`, `pi-ai`
            - Changes to services should have corresponding test coverage

            **Security**
            - No API keys, tokens, or secrets in code
            - User data handling in chat/embeddings must be safe

            ## Verification of external claims

            You have access to WebSearch and WebFetch. When reviewing, if you encounter:
            - Model IDs, API endpoint URLs, or SDK method names you don't recognize
            - Claims about what third-party services support or don't support
            - Version numbers or feature availability of external dependencies

            **Verify before flagging.** Use web search to confirm whether a model ID, API, or library actually exists before claiming it's invalid. If you cannot verify, say "unable to verify" rather than asserting something doesn't exist. False positives waste review cycles.

            ## Output rules

            Your ENTIRE output must be ONLY the formatted review below. Do NOT include any preamble, conversational text, or introductory sentences. Start directly with the header line.

            **SystemSculpt AI -- PR Review**

            ### Summary
            <One line: what the PR does and overall verdict, separated by semicolons. Example: "Adds bridge reconnect logic; refactors settings persistence; looks good, one suggestion below.">

            ### Findings

            If issues found, group by severity. Each item MUST have a bold summary sentence first, then indented detail bullets underneath:

            **Critical** (must fix before merge)

            - **<One-sentence summary of the issue>**
              - `file:line` -- detailed explanation of the problem
              - Why it matters and what to do about it

            **Suggestions** (recommended improvements)

            - **<One-sentence summary of the suggestion>**
              - `file:line` -- detailed explanation
              - Recommended fix or approach

            **Notes** (observations, not blocking)

            - **<One-sentence summary of the note>**
              - Additional context if needed

            Omit any severity section that has no items. If NO issues found at all, write:

            > All clear -- no issues detected. Code looks good across type safety, plugin lifecycle, platform separation, build integrity, tests, and security.

            ### Files Reviewed
            <bullet list of key files touched in this PR>

            Be specific -- cite file paths and line numbers. Skip stylistic nits unless they affect readability significantly.

      - name: Update review comment with findings
        if: always() && steps.init_comment.outputs.comment_id
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ steps.init_comment.outputs.comment_id }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -f "$EXECUTION_FILE" ]; then
            RESULT=$(jq -r '[.[] | select(.type == "result")] | last | .result // empty' "$EXECUTION_FILE" 2>/dev/null || echo "")
            if [ -n "$RESULT" ]; then
              gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -X PATCH \
                -f body="$RESULT"
              echo "Updated comment with review findings"
            else
              gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
                -X PATCH \
                -f body="**SystemSculpt AI -- PR Review**

          Review completed but no structured output was captured. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
              echo "No result found in execution file, posted fallback"
            fi
          else
            gh api "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f body="**SystemSculpt AI -- PR Review**

          Review failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            echo "No execution file found, posted fallback"
          fi
