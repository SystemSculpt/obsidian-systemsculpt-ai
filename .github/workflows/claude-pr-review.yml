name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Post initial review comment
        id: init_comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          BODY="**SystemSculpt AI -- PR Review**

          Reviewing this PR now. Checking:
          - TypeScript strict mode & type safety
          - Plugin lifecycle (settings, bridge, hot-reload)
          - Platform separation (desktop vs mobile)
          - Build & bundle integrity
          - Test coverage
          - Security (no leaked keys, safe user data handling)

          *This comment will be updated with findings shortly...*"

          COMMENT_URL=$(gh pr comment "$PR_NUMBER" --body "$BODY" 2>&1 | grep -o 'https://[^ ]*')
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -o '[0-9]*$')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Posted initial comment: $COMMENT_URL"
      - uses: anthropics/claude-code-action@6e2bd52842c65e914eba5c8badd17560bd26b5de # v1
        id: claude
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number || github.event.issue.number }} for **SystemSculpt AI**, an Obsidian plugin (TypeScript, esbuild, Jest).

            An initial "Reviewing..." comment has already been posted (comment ID: ${{ steps.init_comment.outputs.comment_id }}).

            ## Review criteria

            **TypeScript & type safety**
            - Strict mode compliance -- no untyped `any` without justification
            - Proper use of Obsidian plugin API types

            **Plugin lifecycle**
            - Settings persistence correctness
            - Bridge reconnection and hot-reload paths not broken
            - onload/onunload cleanup (event listeners, intervals, MCP connections)

            **Platform separation**
            - Desktop vs mobile code paths must not bleed across
            - MCP transport and tool registration isolated correctly

            **Architecture**
            - Source structure: `src/core` (plugin/UI), `src/services` (logic), `src/mcp-tools`, `src/settings`, `src/views`, `src/commands`
            - Path alias: `@/*` maps to `Nexus/src/*`

            **Build & bundle**
            - esbuild config changes must not break CSS inlining or banner wrapping
            - Plugin sync (multi-platform vault mirroring) impact if touched

            **Tests**
            - Jest with SWC; mocks for `obsidian`, `pi-coding-agent`, `pi-ai`
            - Changes to services should have corresponding test coverage

            **Security**
            - No API keys, tokens, or secrets in code
            - User data handling in chat/embeddings must be safe

            ## Post your findings

            After reviewing, you MUST update the initial comment by running this command:

            gh api repos/${{ github.repository }}/issues/comments/${{ steps.init_comment.outputs.comment_id }} -X PATCH -f body="<YOUR REVIEW>"

            Format the review body as markdown:

            **SystemSculpt AI -- PR Review**

            ### Summary
            <1-2 sentence overview of what the PR does and overall assessment>

            ### Findings

            If issues found, group by severity:

            **Critical** (must fix before merge)
            - <issue with file:line reference>

            **Suggestions** (recommended improvements)
            - <suggestion with file:line reference>

            **Notes** (observations, not blocking)
            - <note>

            If NO issues found:

            > All clear -- no issues detected. Code looks good across type safety, plugin lifecycle, platform separation, build integrity, tests, and security.

            ### Files Reviewed
            <bullet list of key files touched in this PR>

            Be specific -- cite file paths and line numbers. Skip stylistic nits unless they affect readability significantly.
